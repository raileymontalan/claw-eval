eval:
  default_model: Qwen/Qwen3.6-27B
  judge_model: openai/gpt-oss-120b
  judge_tp: 1
  language: en
  parallel: 8
  trials: 3
models:
  Qwen/Qwen3-32B:
    enable_thinking: true
    reasoning_parser: qwen3
    tool_call_parser: qwen3_coder
    tp: 1
  Qwen/Qwen3.6-27B:
    enable_thinking: true
    reasoning_parser: qwen3
    tool_call_parser: qwen3_coder
    tp: 1

# Runtime sections — base_url and model_id are injected via env vars set by the SLURM script.
# Values here are never hardcoded; the SLURM exports JUDGE_BASE_URL and JUDGE_NAME.
model:
  api_key: dummy
  context_window: 32768
  temperature: 0.0
judge:
  api_key: dummy
  base_url: ${JUDGE_BASE_URL}
  enabled: true
  model_id: ${JUDGE_NAME}
user_agent_model:
  api_key: dummy
  base_url: ${JUDGE_BASE_URL}
  model_id: ${JUDGE_NAME}
